apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm
  labels:
    app: ollama
    component: inference
    part-of: llm-observability-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      runtimeClassName: nvidia
      containers:
      - name: ollama
        image: ollama/ollama:latest
        env:
        # GPU via nvidia runtime (same as dcgm-exporter). Omit nvidia.com/gpu request
        # when the device plugin advertises 0 GPUs on the node (common on k3s/WSL).
        # Re-add resources.limits.nvidia.com/gpu: 1 once allocatable shows 1+.
        - name: NVIDIA_VISIBLE_DEVICES
          value: all
        - name: NVIDIA_DRIVER_CAPABILITIES
          value: compute,utility
        ports:
        - containerPort: 11434
          name: api
        resources:
          requests:
            memory: 2Gi
            cpu: 1000m
          limits:
            memory: 8Gi
            cpu: 2000m
        livenessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 11434
          initialDelaySeconds: 15
          timeoutSeconds: 5
        volumeMounts:
        - name: ollama-models
          mountPath: /root/.ollama
      volumes:
      - name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-models
